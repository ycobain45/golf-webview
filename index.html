<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ゴルフ神動画ライブラリ</title>
    <style>
        /* 高級感のあるゴルフメディア風デザイン（黒基調×グリーンアクセント） */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-sub: #aaaaaa;
            --accent-color: #39ff14; /* ネオングリーン */
            --amazon-color: #ff9900;
            --rakuten-color: #bf0000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px; /* スマホ幅に最適化 */
            padding: 16px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            padding: 12px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 16px;
        }

        header h1 {
            font-size: 16px;
            color: var(--text-sub);
            margin: 0;
            letter-spacing: 1px;
            font-weight: normal;
        }

        /* 小項目タイトル（一等地の上に配置） */
        .sub-title {
            font-size: 22px;
            font-weight: bold;
            color: #ffffff;
            margin: 8px 0 0 0;
            letter-spacing: 0.5px;
        }

        /* 16:9 動画プレイヤー枠 */
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .section-title {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: bold;
        }

        /* 一等地：現物物販カード */
        .item-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-amazon {
            background-color: var(--amazon-color);
            color: #000000;
        }

        .btn-rakuten {
            background-color: var(--rakuten-color);
            color: #ffffff;
        }

        /* 二等地：スマートゴルフ */
        .ad-card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn-sub {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, #00ff87 0%, #60efff 100%);
            color: #000000;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            margin-top: 12px;
            box-shadow: 0 4px 15px rgba(0, 255, 135, 0.3);
        }

        footer {
            text-align: center;
            font-size: 11px;
            color: #555;
            margin-top: auto;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ゴルフ神動画ライブラリ</h1>
            <div id="page-title" class="sub-title">おすすめ動画</div>
        </header>

        <div class="video-list">
            <div class="video-container"><iframe id="video-1" src="" allowfullscreen></iframe></div>
            <div class="video-container"><iframe id="video-2" src="" allowfullscreen></iframe></div>
            <div class="video-container"><iframe id="video-3" src="" allowfullscreen></iframe></div>
        </div>

        <div class="section-title">▼ 今売れている・上達を加速させる神ヒットギア</div>
        <div class="item-card">
            <div class="btn-group">
                <a href="https://www.amazon.co.jp/gp/bestsellers/sports/14315441" target="_blank" class="btn btn-amazon">Amazonで見る</a>
                <a id="rakuten-link" href="https://www.rakuten.co.jp" target="_blank" class="btn btn-rakuten">楽天市場で見る</a>
            </div>
        </div>

        <div class="section-title">▼ 近くの室内練習場を探す</div>
        <div class="ad-card">
            <div style="font-size: 13px; color: var(--text-sub);">24時間365日いつでも完全個室で練習</div>
            <div style="font-size: 16px; font-weight: bold; margin-top: 4px; color: var(--accent-color);">SMART GOLF（スマートゴルフ）</div>
            <a href="https://sma-gol.com" target="_blank" class="btn btn-sub">無料体験レッスンに申し込む</a>
        </div>

        <footer>
            &copy; ゴルフ神動画ライブラリ All Rights Reserved.
        </footer>
    </div>

    <script>
        /**
         * 【37項目 出し分けデータデータベース】
         * ManyChatで指定するIDと、表示したいデータをここに並べていきます。
         */
        const videoDatabase = {
            // 例1: ドライバー スライス
            "dr-slice": {
                title: "ドライバー スライス",
                videos: [
                    "https://www.youtube.com/watch?v=PY0jqwFw6zc",
                    "https://www.youtube.com/watch?v=Fi7p5H93tNM",
                    "https://www.youtube.com/watch?v=Bkv7GgDcKm4"
                ],
                rakutenUrl: "https://a.r10.to/hR5uL4"
            },
            // 例2: ドライバー 飛距離（次の設定用のサンプルです）
            "dr-distance": {
                title: "ドライバー 飛距離",
                videos: [
                    "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
                    "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
                    "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
                ],
                rakutenUrl: "https://www.rakuten.co.jp"
            }
        };

        // YouTubeの通常のURLを埋め込み用(embed)の形式に変換する補助関数
        function getEmbedUrl(url) {
            if (!url) return "";
            let videoId = "";
            if (url.includes("v=")) {
                videoId = url.split("v=")[1].split("&")[0];
            } else if (url.includes("youtu.be/")) {
                videoId = url.split("youtu.be/")[1].split("?")[0];
            } else if (url.includes("embed/")) {
                return url;
            }
            return videoId ? "https://www.youtube.com/embed/" + videoId : url;
        }

        // ページを読み込んだ時にパラメータを解析して中身を書き換えるロジック
        function loadContent() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            // データベースに指定されたIDがある場合のみ書き換え処理を行う
            if (id && videoDatabase[id]) {
                const data = videoDatabase[id];
                
                // 1. タイトルの変更
                document.getElementById('page-title').textContent = data.title;
                
                // 2. 3本の動画URLを埋め込み用に変換してセット
                if (data.videos && data.videos.length >= 3) {
                    document.getElementById('video-1').src = getEmbedUrl(data.videos[0]);
                    document.getElementById('video-2').src = getEmbedUrl(data.videos[1]);
                    document.getElementById('video-3').src = getEmbedUrl(data.videos[2]);
                }
                
                // 3. 楽天アフィリエイトURLの変更
                document.getElementById('rakuten-link').href = data.rakutenUrl;
            }
        }

        // 実行
        window.onload = loadContent;
    </script>

</body>
</html>
