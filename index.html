<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ゴルフ神動画ライブラリ | 特選アイテム</title>
    <style>
        /* 高級感のあるゴルフメディア風デザイン（黒基調×グリーンアクセント） */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-sub: #aaaaaa;
            --accent-color: #39ff14; /* ネオングリーン */
            --amazon-color: #ff9900;
            --rakuten-color: #bf0000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px; /* スマホ幅に最適化 */
            padding: 16px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            padding: 12px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 18px;
            margin: 0;
            letter-spacing: 1px;
        }

        /* 16:9 動画プレイヤー枠 */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 24px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .section-title {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 一等地：現物物販カード */
        .item-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .item-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-amazon {
            background-color: var(--amazon-color);
            color: #000000;
        }

        .btn-rakuten {
            background-color: var(--rakuten-color);
            color: #ffffff;
        }

        /* 二等地：スマートゴルフ */
        .ad-card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn-sub {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, #00ff87 0%, #60efff 100%);
            color: #000000;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            margin-top: 12px;
            box-shadow: 0 4px 15px rgba(0, 255, 135, 0.3);
        }

        footer {
            text-align: center;
            font-size: 11px;
            color: #555;
            margin-top: auto;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ゴルフ神動画ライブラリ</h1>
        </header>

        <!-- 動画プレイヤー（テスト用に公式のゴルフ動画を埋め込み） -->
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
        </div>

        <!-- 【一等地】現物物販 -->
        <div class="section-title">▼ 今売れている・上達を加速させる神ヒットギア</div>
        <div class="item-card">
            <div class="item-title">ゴルフギア</div>
            <div class="btn-group">
                <!-- テスト用ダミーURL（本番はディープリンクを挿入） -->
                <a href="https://www.amazon.co.jp/gp/bestsellers/sports/14315441" target="_blank" class="btn btn-amazon">Amazonで見る</a>
                <a href="https://www.rakuten.co.jp" target="_blank" class="btn btn-rakuten">楽天市場で見る</a>
            </div>
        </div>

        <!-- 【二等地】スマートゴルフ無料体験 -->
        <div class="section-title">▼ 近くの室内練習場を探す</div>
        <div class="ad-card">
            <div style="font-size: 13px; color: var(--text-sub);">24時間365日いつでも完全個室で練習</div>
            <div style="font-size: 16px; font-weight: bold; margin-top: 4px; color: var(--accent-color);">SMART GOLF（スマートゴルフ）</div>
            <a href="https://sma-gol.com" target="_blank" class="btn btn-sub">無料体験レッスンに申し込む</a>
        </div>

        <footer>
            &copy; ゴルフ神動画ライブラリ All Rights Reserved.
        </footer>
    </div>

</body>
</html>
