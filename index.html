        :root {

            --text-color: #ffffff;
            --text-sub: #aaaaaa;
            --accent-color: #39ff14; /* ネオングリーン */
            --amazon-color: #ff9900;
            --rakuten-color: #bf0000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px; /* スマホ幅に最適化 */
            padding: 16px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            padding: 12px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 15px;
        }

        header h1 {
            font-size: 18px;
            margin: 0;
            letter-spacing: 1px;
        }

        /* 小項目タイトル表示スペース */
        .sub-header {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff; /* 白文字 */
            margin-bottom: 25px;
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
        }

        .section-title {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 16:9 動画プレイヤー枠 */
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 24px;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* 一等地：現物物販カード */
        .item-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .item-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 12px;
            line-height: 1.5;
            color: #ffffff;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-amazon {
            background-color: var(--amazon-color);
            color: #000000;
        }

        .btn-rakuten {
            background-color: var(--rakuten-color);
            color: #ffffff;
        }

        /* 二等地：スマートゴルフ */
        .ad-card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px 16px;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn-sub {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, #00ff87 0%, #60efff 100%);
            color: #000000;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            margin-top: 4px;
            box-shadow: 0 4px 15px rgba(0, 255, 135, 0.3);
        }

        footer {
            text-align: center;
            font-size: 11px;
            color: #555;
            margin-top: auto;
            padding: 20px 0;
        }
    </style>
</head>

        // YouTubeの通常URLを埋め込み用形式に変換する関数
        function getEmbedUrl(url) {
            if(!url) return "";
            let videoId = "";
            if (url.includes("v=")) {
                videoId = url.split("v=")[1].split("&")[0];
            } else if (url.includes("youtu.be/")) {
                videoId = url.split("youtu.be/")[1].split("?")[0];
            } else if (url.includes("embed/")) {
                return url;
            }
            return videoId ? "https://www.youtube.com/embed/" + videoId : url;
        }

        // パラメータを解析して中身をロードするメイン関数
        function loadContent() {
            const urlParams = new URLSearchParams(window.location.search);
            // ManyChatとの連携を考慮し、?id=番号 で抽出する形式に固定（デフォルトは1）
            const id = urlParams.get('id') || "1";

            if (videoDatabase[id]) {
                const data = videoDatabase[id];
                
                // サブヘッダーのテキストを完全に元の形式に固定
                document.getElementById('sub-header').textContent = data.subTitle;
                
                // 商品説明、各種リンクの書き換え
                document.getElementById('item-title').innerHTML = data.description.replace(/\n/g, '<br>');
                document.getElementById('amazon-link').href = data.amazonUrl || defaultAmazon;
                document.getElementById('rakuten-link').href = data.rakutenUrl;
                
                // 動画プレイヤー枠をリストに動的生成（元のデザイン構造を維持）
                const videoListContainer = document.getElementById('video-list');
                videoListContainer.innerHTML = ''; // 一度クリア
                
                if (data.videos && data.videos.length > 0) {
                    data.videos.forEach(videoUrl => {
                        const embedUrl = getEmbedUrl(videoUrl);
                        if (embedUrl) {
                            const videoContainer = document.createElement('div');
                            videoContainer.className = 'video-container';
                            
                            const iframe = document.createElement('iframe');
                            iframe.src = embedUrl;
                            iframe.allowFullscreen = true;
                            
                            videoContainer.appendChild(iframe);
                            videoListContainer.appendChild(videoContainer);
                        }
                    });
                }
            }
        }

        window.onload = loadContent;
    </script>
