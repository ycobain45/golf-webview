        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-sub: #aaaaaa;
            --accent-color: #39ff14; /* ネオングリーン */
            --amazon-color: #ff9900;

            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px; /* スマホ幅に最適化 */
            padding: 16px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            padding: 12px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 15px;
        }

        header h1 {
            font-size: 18px;
            margin: 0;
            letter-spacing: 1px;
        }

        /* 小項目タイトル表示スペース */
        .sub-header {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff; /* 白文字 */
            margin-bottom: 25px;
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
        }

        .section-title {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 16:9 動画プレイヤー枠 */
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 24px;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* 一等地：現物物販カード */
        .item-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .item-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        /* アフィリエイトボタン */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            text-decoration: none;
            box-sizing: border-box;
            transition: opacity 0.2s;
        }

        .btn:active {

        }

        .btn-rakuten {

        }

            text-align: center;
            color: #ff4444;
            padding: 20px;
            font-size: 14px;
        }

        // パラメータ解析用関数（全角・半角スペース両対応でクリーンアップ）
        function getKeywordParam() {
            const params = new URLSearchParams(window.location.search);
            let keyword = params.get('k') || params.get('keyword');
            if (!keyword) return null;
            
            // デコードして前後の空白（全角半角含む）を除去、連続する空白を半角スペース1つに統合
            keyword = decodeURIComponent(keyword).trim();
            keyword = keyword.replace(/[\s\u3000]+/g, ' ');
            return keyword;
        }

        // YouTube URLから埋め込み用のVideo IDを抽出する関数
        function getYouTubeId(url) {
            if (!url) return null;
            let videoId = null;
            
            // https://youtu.be/abc 形式のパース
            if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1].split(/[?#]/)[0];
            } 
            // https://www.youtube.com/watch?v=abc または /v/ 等のパース
            else if (url.includes('v=')) {
                videoId = url.split('v=')[1].split(/[&#]/)[0];
            } else if (url.includes('/embed/')) {
                videoId = url.split('/embed/')[1].split(/[?#]/)[0];
            }
            return videoId;
        }

        // メイン制御処理
        document.addEventListener("DOMContentLoaded", () => {
            const keyword = getKeywordParam();
            const keywordDisplay = document.getElementById("keyword-display");
            const videoList = document.getElementById("video-list");
            const itemCard = document.getElementById("item-card");
            const itemDescription = document.getElementById("item-description");
            const amazonLink = document.getElementById("amazon-link");
            const rakutenLink = document.getElementById("rakuten-link");

            if (!keyword) {
                keywordDisplay.textContent = "キーワードが指定されていません";
                videoList.innerHTML = '<div class="error-msg">URLの末尾に ?k=キーワード をつけてアクセスしてください。</div>';
                return;
            }

            keywordDisplay.textContent = `「${keyword}」のレッスン動画`;

            // データベースから完全一致検索
            const data = dynamicData[keyword];

            if (data) {
                // 1. YouTube動画のレンダリング
                let videoCount = 0;
                data.videos.forEach(url => {
                    const videoId = getYouTubeId(url);
                    if (videoId) {
                        videoCount++;
                        const container = document.createElement("div");
                        container.className = "video-container";
                        
                        const iframe = document.createElement("iframe");
                        iframe.src = `https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1`;
                        iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                        iframe.allowFullscreen = true;
                        
                        container.appendChild(iframe);
                        videoList.appendChild(container);
                    }
                });

                if (videoCount === 0) {
                    videoList.innerHTML = '<div class="error-msg">表示できる動画が見つかりませんでした。</div>';
                }

                // 2. マネタイズ現物商品の表示制御
                if (data.desc) {
                    itemDescription.textContent = data.desc;
                    
                    // Amazonリンク制御（空なら非表示）
                    if (data.amazon && data.amazon.trim() !== "") {
                        amazonLink.href = data.amazon;
                        amazonLink.style.display = "flex";
                    } else {
                        amazonLink.style.style.display = "none";
                    }

                    // 楽天リンク制御（空なら非表示）
                    if (data.rakuten && data.rakuten.trim() !== "") {
                        rakutenLink.href = data.rakuten;
                        rakutenLink.style.display = "flex";
                    } else {
                        rakutenLink.style.display = "none";
                    }

                    // 両方空でなければカード自体を表示
                    if (data.amazon || data.rakuten) {
                        itemCard.style.display = "block";
                    }
                }
            } else {
                // 該当データがない場合のエラー表示
                videoList.innerHTML = `<div class="error-msg">「${keyword}」に対応する動画ライブラリがまだ登録されていません。</div>`;
            }
        });
    </script>
